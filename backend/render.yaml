services:
  - type: web
    name: django-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: render-postgres
          property: connectionString

  - type: static
    name: react-frontend
    buildCommand: "npm install && npm run build"
    publishPath: "build"

databases:
  - name: render-postgres